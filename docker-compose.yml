version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pairspace-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pairspace
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./services/api/uploads:/app/services/api/uploads

  mongo:
    image: mongo:7
    container_name: pairspace-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: pairspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  mongo_data:
