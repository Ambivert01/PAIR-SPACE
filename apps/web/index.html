<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>PairSpace — Your Shared Digital Relationship Space</title>
    <meta
      name="description"
      content="Stay connected with your partner through shared memories, real-time experiences, and meaningful interactions. A private digital world for two."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

      property="og:title"
      content="PairSpace — Your Shared Digital Relationship Space"
    />
    <meta
      property="og:description"
      content="Stay connected with your partner through shared memories, real-time experiences, and meaningful interactions."
    />

      name="twitter:title"
      content="PairSpace — Your Shared Digital Relationship Space"
    />
    <meta
      name="twitter:description"
      content="Stay connected with your partner through shared memories, real-time experiences, and meaningful interactions."
